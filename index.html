<!DOCTYPE html>
<html>
    <head>
         <title>CineNest</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }
 
        body{
            height:100vh;
            margin:0;
            background:
                linear-gradient(to right, rgba(179,0,0,0.6), rgba(0,0,0,0.8)),
                url("movieslide.jpg.jpg");
            background-size:cover;
            background-position:center;
        }
 
        .navbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px 60px;
            background:linear-gradient(to right, #b30000, #4d0000);
            color:white;
        }
 
        .logo{
            font-size:30px;
            font-weight:bold;
        }
 
        .login-box{
            width:360px;
            background: rgba(0,0,0,0.85);
            color:white;
            padding:25px;
            border-radius:10px;
            margin:120px auto;
        }
 
        .login-box h1{
            text-align:center;
            margin-bottom:10px;
        }
 
        .login-box p.subtitle{
            text-align:center;
            font-size:14px;
            margin-bottom:20px;
            color:#ccc;
        }
 
        .login-box input[type=text],
        .login-box input[type=password]{
            width:100%;
            padding:10px;
            margin:8px 0;
            border:none;
            border-radius:5px;
            box-sizing:border-box;
        }
 
        .login-box button{
            width:100%;
            padding:10px;
            margin-top:10px;
            border:none;
            cursor:pointer;
            border-radius:5px;
            color:white;
        }
 
        .loginbtn{
            background:#b30000;
        }
 
        .loginbtn:hover{
            background:#ff1a1a;
        }
 
        .login-box p.signup-link{
            text-align:center;
            margin-top:14px;
            font-size:14px;
            color:#ccc;
        }
 
        .login-box p.signup-link a{
            color:#ff6666;
        }
    </style>
        </head>
<body>


    <div class="navbar">
        <div class="logo">CineNest</div>
    </div>
<center>
    <div class="login-box">
    <h2>Login</h2>

    <form>
        <input type="text" placeholder="Email" required>
        <input type="password" placeholder="Password" required>
<button type="submit" class="loginbtn">Login</button>
        <br></br>
<p class="signup-link">Don't have an account? <a href="cinenestSIGNUP.html"><u>Signup</u></a></p>    </form>

    <script>
document.querySelector("form").addEventListener("submit", function(e){
    e.preventDefault();

    const email = document.querySelector("input[type='text']").value;
    const password = document.querySelector("input[type='password']").value;

    const savedEmail = localStorage.getItem("userEmail");
    const savedPassword = localStorage.getItem("userPassword");

    if(email === savedEmail && password === savedPassword){
        alert("Login successful!");
        window.location.href = "cineNest.html"; 
    } else {
        alert("Invalid email or password");
    }
});

</script>
</div>
    </center>
    </body>
